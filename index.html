<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Component Requirements Form</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; max-width: 900px; margin: auto; }
    label { font-weight: bold; margin-top: 20px; display: block; }
    textarea, input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 30px; padding: 14px 22px; background: #005ea5; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

<h1>Component Requirements Form</h1>

<form id="component-form">

  <label>Component Name</label>
  <input name="componentName" required />

  <label>Definition</label>
  <textarea name="definition"></textarea>

  <label>Use Case 1</label>
  <textarea name="useCase1"></textarea>

  <label>Use Case 2</label>
  <textarea name="useCase2"></textarea>

  <label>Use Case 3</label>
  <textarea name="useCase3"></textarea>

  <label>Use Case 4</label>
  <textarea name="useCase4"></textarea>

  <button type="submit">Submit</button>
</form>

<script>
  const form = document.getElementById("component-form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    const res = await fetch("https://component-requirements-form.onrender.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert("Submitted!");
      form.reset();
    } else {
      alert("Error submitting form.");
    }
  });
</script>

</body>
</html>
