<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GC Component Documentation Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 900px;
      margin: auto;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
    }
    details {
      margin-bottom: 25px;
      background: white;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    summary {
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
    }
    button {
      margin-top: 30px;
      padding: 14px 22px;
      background: #005ea5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #003f73;
    }
    .success {
      margin-top: 20px;
      padding: 15px;
      background: #dff0d8;
      border: 1px solid #b2d8b2;
      color: #3c763d;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

<h1>GC Component Documentation Form</h1>

<form id="component-form">

  <!-- SECTION 1 — COMPONENT IDENTITY -->
  <details open>
    <summary>1. Component Identity</summary>

    <label>Component Name</label>
    <input name="componentName" required />

    <label>Also Called (comma-separated synonyms)</label>
    <input name="alsoCalled" />

    <label>One-sentence Definition</label>
    <textarea name="definition" rows="2" placeholder="One sentence describing what the component is"></textarea>

    <label>Preview Image URL</label>
    <input name="previewImageURL" />

    <label>Preview Image Alt Text (required if static image)</label>
    <textarea name="previewImageAltText" rows="2"></textarea>
  </details>

  <!-- SECTION 2 — USE CASES -->
  <details>
    <summary>2. Use Cases</summary>

    <label>Intro Text (mandatory components only)</label>
    <textarea name="useCaseIntro" rows="2"></textarea>

    <label>Use Case 1</label>
    <textarea name="useCase1" rows="2"></textarea>

    <label>Use Case 2</label>
    <textarea name="useCase2" rows="2"></textarea>

    <label>Use Case 3</label>
    <textarea name="useCase3" rows="2"></textarea>

    <label>Use Case 4</label>
    <textarea name="useCase4" rows="2"></textarea>
  </details>

  <!-- SECTION 3 — PROBLEMS SOLVED -->
  <details>
    <summary>3. Problems the Component Solves</summary>

    <label>Intro Sentence (optional)</label>
    <textarea name="problemsIntro" rows="2"></textarea>

    <label>Problem 1</label>
    <textarea name="problem1" rows="2"></textarea>

    <label>Problem 2</label>
    <textarea name="problem2" rows="2"></textarea>

    <label>Problem 3</label>
    <textarea name="problem3" rows="2"></textarea>

    <label>Problem 4</label>
    <textarea name="problem4" rows="2"></textarea>
  </details>
