<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GC Component Documentation Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 900px;
      margin: auto;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 40px;
      border-bottom: 2px solid #ccc;
      padding-bottom: 5px;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
    }
    button {
      margin-top: 30px;
      padding: 14px 22px;
      background: #005ea5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #003f73;
    }
    .success {
      margin-top: 20px;
      padding: 15px;
      background: #dff0d8;
      border: 1px solid #b2d8b2;
      color: #3c763d;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>GC Component Documentation Form</h1>

  <form id="component-form">

    <h2>Metadata</h2>
    <label>Component Name</label>
    <input type="text" name="name" required />

    <label>Short Description</label>
    <textarea name="shortDescription" rows="2"></textarea>

    <label>Status (stable, draft, deprecated)</label>
    <input type="text" name="status" />

    <label>Version</label>
    <input type="text" name="version" />

    <label>Tags (comma-separated)</label>
    <input type="text" name="tags" />

    <h2>Overview</h2>
    <label>Overview</label>
    <textarea name="overview" rows="3"></textarea>

    <h2>Usage</h2>
    <label>When to Use</label>
    <textarea name="whenToUse" rows="3"></textarea>

    <label>When Not to Use</label>
    <textarea name="whenNotToUse" rows="3"></textarea>

    <h2>How It Works</h2>
    <label>How It Works</label>
    <textarea name="howItWorks" rows="3"></textarea>

    <label>States</label>
    <textarea name="states" rows="2"></textarea>

    <label>Interactions</label>
    <textarea name="interactions" rows="2"></textarea>

    <h2>Anatomy</h2>
    <label>Anatomy</label>
    <textarea name="anatomy" rows="3"></textarea>

    <h2>Content Guidelines</h2>
    <label>Content Guidelines</label>
    <textarea name="contentGuidelines" rows="3"></textarea>

    <h2>Accessibility</h2>
    <label>Keyboard Interaction</label>
    <textarea name="accessibilityKeyboard" rows="2"></textarea>

    <label>Screen Reader Notes</label>
    <textarea name="accessibilityScreenReader" rows="2"></textarea>

    <label>WCAG Considerations</label>
    <textarea name="accessibilityWCAG" rows="2"></textarea>

    <h2>Code Examples</h2>
    <label>HTML Example</label>
    <textarea name="htmlExample" rows="3"></textarea>

    <label>React Example</label>
    <textarea name="reactExample" rows="3"></textarea>

    <label>Variant Examples</label>
    <textarea name="variantExamples" rows="3"></textarea>

    <h2>Design Tokens</h2>
    <label>Color Tokens</label>
    <textarea name="tokensColor" rows="2"></textarea>

    <label>Spacing Tokens</label>
    <textarea name="tokensSpacing" rows="2"></textarea>

    <label>Typography Tokens</label>
    <textarea name="tokensTypography" rows="2"></textarea>

    <h2>API / Props</h2>
    <label>Props (JSON or text)</label>
    <textarea name="props" rows="3"></textarea>

    <h2>Related Components</h2>
    <label>Related Components</label>
    <textarea name="relatedComponents" rows="2"></textarea>

    <button type="submit">Submit</button>
  </form>

  <div class="success" id="success-message">
    Submission saved successfully!
  </div>

  <script>
    const form = document.getElementById("component-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch("https://component-requirements-form.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        successMessage.style.display = "block";
        form.reset();
      } else {
        alert("Error submitting form.");
      }
    });
  </script>
</body>
</html>
