<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Submissions Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      vertical-align: top;
    }
    th {
      background: #eee;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
    }
  </style>
</head>
<body>

  <h1>Form Submissions</h1>
  <table id="submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadSubmissions() {
      const res = await fetch("https://component-requirements-form.onrender.com/submissions");
      const submissions = await res.json();

      const tbody = document.querySelector("#submissions-table tbody");
      tbody.innerHTML = "";

      submissions.forEach(sub => {
        const row = document.createElement("tr");

        const idCell = document.createElement("td");
        idCell.textContent = sub.id;

        const dataCell = document.createElement("td");
        const parsed = JSON.parse(sub.data);
        dataCell.innerHTML = "<pre>" + JSON.stringify(parsed, null, 2) + "</pre>";

        row.appendChild(idCell);
        row.appendChild(dataCell);
        tbody.appendChild(row);
      });
