<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Component Documentation Submissions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      vertical-align: top;
    }
    th {
      background: #eee;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
    }
    button {
      padding: 6px 12px;
      background: #005ea5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #003f73;
    }
  </style>
</head>
<body>

  <h1>Component Documentation Submissions</h1>

  <table id="submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Data</th>
        <th>Generate</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadSubmissions() {
      const res = await fetch("https://component-requirements-form.onrender.com/submissions");
      const submissions = await res.json();

      const tbody = document.querySelector("#submissions-table tbody");
      tbody.innerHTML = "";

      submissions.forEach(sub => {
        const row = document.createElement("tr");

        const idCell = document.createElement("td");
        idCell.textContent = sub.id;

        const dataCell = document.createElement("td");
        const parsed = JSON.parse(sub.data);

        // Pretty-print ALL fields dynamically
        dataCell.innerHTML = "<pre>" + JSON.stringify(parsed, null, 2) + "</pre>";

        const docCell = document.createElement("td");
        const btn = document.createElement("button");
        btn.textContent = "Generate Documentation";
        btn.onclick = () => downloadDoc(parsed);
        docCell.appendChild(btn);

        row.appendChild(idCell);
        row.appendChild(dataCell);
        row.appendChild(docCell);
        tbody.appendChild(row);
      });
    }

    // NEW GC-STYLE MARKDOWN GENERATOR
    function generateMarkdown(d) {
      return `
# ${d.componentName || ""}

Also called: ${d.alsoCalled || ""}

## Definition
${d.definition || ""}

![Preview image](${d.previewImageURL || ""})
*Alt text:* ${d.previewImageAltText || ""}

---

# Use Cases
${d.useCaseIntro || ""}

- ${d.useCase1 || ""}
- ${d.useCase2 || ""}
- ${d.useCase3 || ""}
- ${d.useCase4 || ""}

---

# Problems This Component Solves
${d.problemsIntro || ""}

- ${d.problem1 || ""}
- ${d.problem2 || ""}
- ${d.problem3 || ""}
- ${d.problem4 || ""}

---

# Related Components
- ${d.related1 || ""}
- ${d.related2 || ""}
- ${d.related3 || ""}

---

# Component Types & Roles

## ${d.type1Name || ""}
![Type image](${d.type1ImageURL || ""})
*Alt text:* ${d.type1ImageAlt || ""}

Use this type to:
- ${d.type1Use1 || ""}
- ${d.type1Use2 || ""}
- ${d.type1Use3 || ""}
- ${d.type1Use4 || ""}

---

# Anatomy

![Anatomy](${d.anatomyImageURL || ""})
*Alt text:* ${d.anatomyAltText || ""}

### Elements
- ${d.anatomyElement1 || ""}
- ${d.anatomyElement2 || ""}
- ${d.anatomyElement3 || ""}
- ${d.anatomyElement4 || ""}

---

# Design & Accessibility

${d.designAccessibilityIntro || ""}

### Requirements
- ${d.requirement1 || ""}
- ${d.requirement2 || ""}
- ${d.requirement3 || ""}
- ${d.requirement4 || ""}

### Details Sections
#### ${d.details1Title || ""}
${formatBullets(d.details1Bullets)}

#### ${d.details2Title || ""}
${formatBullets(d.details2Bullets)}

#### ${d.details3Title || ""}
${formatBullets(d.details3Bullets)}

---

# Canada.ca Requirements

### Required Elements
${formatBullets(d.requiredElements)}

### Optional Elements
${formatBullets(d.optionalElements)}

### Subsections
#### ${d.subsection1Title || ""}
${formatBullets(d.subsection1Bullets)}

#### ${d.subsection2Title || ""}
${formatBullets(d.subsection2Bullets)}

---

# Code

## Complete Implementation
![Preview](${d.completePreviewURL || ""})

\`\`\`html
${d.completeCode || ""}
\`\`\`

## Essential Attributes
${formatBullets(d.essentialAttributes)}

## Optional Attributes
${formatBullets(d.optionalAttributes)}

## Slots
${formatBullets(d.slots)}

---

# Code Builder
${d.codeBuilderNotes || ""}

1. ${d.codeBuilderStep1 || ""}
2. ${d.codeBuilderStep2 || ""}
3. ${d.codeBuilderStep3 || ""}
`;
    }

    function formatBullets(text) {
      if (!text) return "";
      return text
        .split("\n")
        .filter(line => line.trim() !== "")
        .map(line => `- ${line}`)
        .join("\n");
    }

    function downloadDoc(data) {
      const md = generateMarkdown(data);
      const blob = new Blob([md], { type: "text/markdown" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = `${data.componentName?.replace(/\s+/g, "-").toLowerCase() || "component"}.md`;
      a.click();

      URL.revokeObjectURL(url);
    }

    loadSubmissions();
  </script>

</body>
</html>
