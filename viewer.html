<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Component Submissions Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #f5f5f5;
    }
    .details {
      background: #fafafa;
      padding: 15px;
      border: 1px solid #ddd;
      margin-top: 10px;
      display: none;
    }
    .expand-btn, .generate-btn {
      cursor: pointer;
      color: #0078d4;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
    }
    #generate-all {
      background: #0078d4;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    #generate-all:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

  <h1>Component Submissions</h1>

  <!-- NEW BUTTON: Generate full HTML file -->
  <button id="generate-all">Generate All Documentation (HTML)</button>

  <table id="submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Component Name</th>
        <th>Submitted</th>
        <th>Details</th>
        <th>Documentation</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API = "https://component-requirements-form.onrender.com";

    function buildSingleDoc(data) {
      const name = data.componentName || "Untitled component";

      return `
        <section style="margin-bottom: 60px;">
          <h1>${name}</h1>

          <h2>Overview</h2>
          <p>${data.summary || ""}</p>

          <h2>When to use this component</h2>
          <p>${data.whenToUse || ""}</p>

          <h2>When not to use this component</h2>
          <p>${data.whenNotToUse || ""}</p>

          <h2>How it works</h2>
          <p>${data.howItWorks || ""}</p>

          <h2>Anatomy</h2>
          <p>${data.anatomy || ""}</p>

          <h2>Content guidelines</h2>
          <p>${data.contentGuidelines || ""}</p>

          <h2>Accessibility considerations</h2>
          <p>${data.accessibility || ""}</p>

          <h2>Code examples</h2>
          <pre><code>${data.codeExample || ""}</code></pre>

          <h2>Related components</h2>
          <p>${data.relatedComponents || ""}</p>

          <hr style="margin-top: 40px;">
        </section>
      `;
    }

    async function loadSubmissions() {
      const res = await fetch(`${API}/submissions`);
      const submissions = await res.json();

      const tbody = document.querySelector("#submissions-table tbody");
      tbody.innerHTML = "";

      submissions.forEach((entry) => {
        const data = JSON.parse(entry.data);

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${entry.id}</td>
          <td>${data.componentName || "(no name)"}</td>
          <td>${entry.created_at || ""}</td>
          <td><button class="expand-btn" data-id="${entry.id}">Expand</button></td>
          <td><button class="generate-btn" data-id="${entry.id}">Generate documentation</button></td>
        `;

        tbody.appendChild(tr);

        const detailsRow = document.createElement("tr");
        detailsRow.innerHTML = `
          <td colspan="5">
            <div class="details" id="details-${entry.id}">
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          </td>
        `;
        tbody.appendChild(detailsRow);
      });

      // Expand/collapse
      document.querySelectorAll(".expand-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const panel = document.getElementById("details-" + id);
          panel.style.display = panel.style.display === "block" ? "none" : "block";
        });
      });

      // Per-row documentation
      document.querySelectorAll(".generate-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const entry = submissions.find(s => String(s.id) === String(id));
          if (!entry) return;

          const data = JSON.parse(entry.data);
          const html = `
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>${data.componentName || "Component"} – Documentation</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px; line-height: 1.6; }
    h1, h2 { margin-top: 1.4em; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 4px; }
  </style>
</head>
<body>
  ${buildSingleDoc(data)}
</body>
</html>
          `.trim();

          const blob = new Blob([html], { type: "text/html" });
          const url = URL.createObjectURL(blob);
          window.open(url, "_blank");
        });
      });

      // Generate ALL documentation
      document.getElementById("generate-all").addEventListener("click", () => {
        let sections = "";
        submissions.forEach(entry => {
          const data = JSON.parse(entry.data);
          sections += buildSingleDoc(data);
        });

        const fullHtml = `
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Component Documentation</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px; line-height: 1.6; }
    h1 { margin-top: 40px; }
    h2 { margin-top: 20px; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 4px; }
  </style>
</head>
<body>
  ${sections}
</body>
</html>
        `.trim();

        const blob = new Blob([fullHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      });
    }

    loadSubmissions();
  </script>

</body>
</html>
