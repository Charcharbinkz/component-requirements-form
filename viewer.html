
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Component Submissions Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #f5f5f5;
    }
    .details {
      background: #fafafa;
      padding: 15px;
      border: 1px solid #ddd;
      margin-top: 10px;
      display: none;
    }
    .expand-btn {
      cursor: pointer;
      color: #0078d4;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Component Submissions</h1>

  <table id="submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Component Name</th>
        <th>Submitted</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadSubmissions() {
      const res = await fetch("/submissions");
      const submissions = await res.json();

      const tbody = document.querySelector("#submissions-table tbody");
      tbody.innerHTML = "";

      submissions.forEach((entry) => {
        const data = JSON.parse(entry.data);

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${entry.id}</td>
          <td>${data.componentName || "(no name)"}</td>
          <td>${entry.created_at || ""}</td>
          <td><span class="expand-btn" data-id="${entry.id}">Expand</span></td>
        `;

        tbody.appendChild(tr);

        // Details row
        const detailsRow = document.createElement("tr");
        detailsRow.innerHTML = `
          <td colspan="4">
            <div class="details" id="details-${entry.id}">
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          </td>
        `;
        tbody.appendChild(detailsRow);
      });

      // Add expand/collapse behavior
      document.querySelectorAll(".expand-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const panel = document.getElementById("details-" + id);
          panel.style.display = panel.style.display === "block" ? "none" : "block";
        });
      });
    }

    loadSubmissions();
  </script>

</body>
</html>
